<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sieci komputerowe od strony biologiczno-chemicznej i materiałowej</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
<link rel="stylesheet" href="styl.css">
</head>
<section class="py-5">

    <div class="container">

        <div class="card">

            <h2 class="mb-4">
                Kontakt
            </h2>

            <div class="border-bottom border-3 border-light w-25 mb-4"></div>

            <div class="row g-4">

                <!-- DANE -->

                <div class="col-md-6">

                    <h5>
                        Dane kontaktowe
                    </h5>

                    <p>
                        <strong>Autor:</strong><br>

                        <!-- UZUPEŁNIJ -->
                        TWOJE IMIĘ I NAZWISKO
                    </p>

                    <p>
                        <strong>E-mail:</strong><br>

                        <!-- UZUPEŁNIJ -->
                        twojemail@gmail.com
                    </p>

                    <p>
                        <strong>Telefon:</strong><br>

                        <!-- UZUPEŁNIJ -->
                        +48 000 000 000
                    </p>

                    <p>
                        <strong>Lokalizacja:</strong><br>

                        <!-- UZUPEŁNIJ -->
                        Polska
                    </p>

                </div>

                <!-- FORMULARZ -->

                <div class="col-md-6">

                    <h5 class="mb-3">
                        Formularz kontaktowy
                    </h5>

                    <!-- UZUPEŁNIJ EMAIL -->

                    <form
                        action="https://formsubmit.co/TWOJEMAIL@gmail.com"
                        method="POST"
                    >

                        <!-- WYŁĄCZENIE CAPTCHA -->

                        <input
                            type="hidden"
                            name="_captcha"
                            value="false"
                        >

                        <!-- PRZEKIEROWANIE PO WYSŁANIU -->

                        <!-- UZUPEŁNIJ LINK -->

                        <input
                            type="hidden"
                            name="_next"
                            value="https://twojastrona.pl/dziekuje.html"
                        >

                        <!-- IMIĘ -->

                        <div class="mb-3">

                            <label class="form-label">
                                Imię
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                name="imie"
                                placeholder="Wpisz imię"
                                required
                            >

                        </div>

                        <!-- EMAIL -->

                        <div class="mb-3">

                            <label class="form-label">
                                Adres e-mail
                            </label>

                            <input
                                type="email"
                                class="form-control"
                                name="email"
                                placeholder="Wpisz e-mail"
                                required
                            >

                        </div>

                        <!-- WIADOMOŚĆ -->

                        <div class="mb-3">

                            <label class="form-label">
                                Wiadomość
                            </label>

                            <textarea
                                class="form-control"
                                rows="5"
                                name="wiadomosc"
                                placeholder="Napisz wiadomość"
                                required
                            ></textarea>

                        </div>

                        <!-- PRZYCISK -->

                        <button
                            type="submit"
                            class="btn btn-light px-4"
                        >
                            Wyślij
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</section>
